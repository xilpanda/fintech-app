name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - k8s/kustomization.yaml

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: xilpanda
  BACKEND_IMAGE_NAME: linuxspec-backend
  FRONTEND_IMAGE_NAME: linuxspec-frontend
  TRIVY_SEVERITY: HIGH,CRITICAL

jobs:
  deploy:
    if: >-
      ${{ github.event.head_commit.message != 'build: automatic update of fintech-app' }}
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Secret scan (Gitleaks)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.24.3 detect \
            --source /repo --redact --verbose --exit-code 1

      - name: Install Trivy
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          trivy --version

      - name: Install Syft and Cosign
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          SYFT_VERSION="1.42.3"
          COSIGN_VERSION="v2.4.3"
          curl -sSfL "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz" \
            -o "$RUNNER_TEMP/bin/syft.tar.gz"
          tar -xzf "$RUNNER_TEMP/bin/syft.tar.gz" -C "$RUNNER_TEMP/bin" syft
          chmod +x "$RUNNER_TEMP/bin/syft"
          rm -f "$RUNNER_TEMP/bin/syft.tar.gz"
          curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o "$RUNNER_TEMP/bin/cosign"
          chmod +x "$RUNNER_TEMP/bin/cosign"

          export PATH="$RUNNER_TEMP/bin:$PATH"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          syft version
          cosign version

      - name: Check Cosign signing configuration
        id: cosign_config
        run: |
          if [ -n "${{ secrets.COSIGN_PRIVATE_KEY }}" ] && [ -n "${{ secrets.COSIGN_PUBLIC_KEY }}" ] && [ -n "${{ secrets.COSIGN_PASSWORD }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cosign secrets are not fully configured. Signing and attestation steps will be skipped."
          fi

      - name: Filesystem vulnerability scan (Trivy)
        run: |
          trivy fs --ignore-unfixed --ignorefile .trivyignore \
            --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 .

      - name: Set image tag
        run: |
          TAG=${GITHUB_SHA::7}
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: GHCR login
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          TOKEN="${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || github.token }}"
          USERNAME="${GHCR_USERNAME:-${{ env.REGISTRY_OWNER }}}"
          echo "$TOKEN" | docker login ${{ env.REGISTRY }} -u "$USERNAME" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG ./linuxspec-backend

      - name: Generate backend SBOM (Syft)
        run: |
          mkdir -p sbom
          syft ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG \
            -o spdx-json=sbom/backend-${TAG}.spdx.json

      - name: Scan backend image (Trivy)
        run: |
          trivy image --ignore-unfixed --ignorefile .trivyignore \
            --vuln-type os --scanners vuln \
            --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG

      - name: Push backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG || (sleep 5 && docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG)

      - name: Sign and verify backend image (Cosign)
        if: steps.cosign_config.outputs.enabled == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$IMAGE"
          cosign verify --key env://COSIGN_PUBLIC_KEY "$IMAGE"
          cosign attest --yes --key env://COSIGN_PRIVATE_KEY --predicate "sbom/backend-${TAG}.spdx.json" --type spdx "$IMAGE"

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.linuxspec.com \
            --build-arg NEXT_PUBLIC_CALENDLY_URL=https://calendly.com/linuxspec/intro-call \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG \
            ./linuxspec-frontend

      - name: Generate frontend SBOM (Syft)
        run: |
          mkdir -p sbom
          syft ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG \
            -o spdx-json=sbom/frontend-${TAG}.spdx.json

      - name: Scan frontend image (Trivy)
        run: |
          trivy image --ignore-unfixed --ignorefile .trivyignore \
            --vuln-type os --scanners vuln \
            --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG

      - name: Push frontend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG || (sleep 5 && docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG)

      - name: Sign and verify frontend image (Cosign)
        if: steps.cosign_config.outputs.enabled == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$IMAGE"
          cosign verify --key env://COSIGN_PUBLIC_KEY "$IMAGE"
          cosign attest --yes --key env://COSIGN_PRIVATE_KEY --predicate "sbom/frontend-${TAG}.spdx.json" --type spdx "$IMAGE"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.run_id }}-${{ github.run_attempt }}
          path: sbom/*.spdx.json
          if-no-files-found: error

      - name: Update deployment image
        run: |
          sed -i "/name: ${{ env.REGISTRY }}\\/${{ env.REGISTRY_OWNER }}\\/${{ env.BACKEND_IMAGE_NAME }}/{n;s/newTag:.*/newTag: $TAG/;}" k8s/kustomization.yaml
          sed -i "/name: ${{ env.REGISTRY }}\\/${{ env.REGISTRY_OWNER }}\\/${{ env.FRONTEND_IMAGE_NAME }}/{n;s/newTag:.*/newTag: $TAG/;}" k8s/kustomization.yaml

      - name: Sync backend secrets from GitHub secrets
        env:
          BACKEND_MONGO_URI: ${{ secrets.BACKEND_MONGO_URI }}
          BACKEND_ADMIN_API_KEY: ${{ secrets.BACKEND_ADMIN_API_KEY }}
          BACKEND_EMAIL: ${{ secrets.BACKEND_EMAIL }}
          BACKEND_EMAIL_PASS: ${{ secrets.BACKEND_EMAIL_PASS }}
        run: |
          MISSING=0
          for VAR_NAME in BACKEND_MONGO_URI BACKEND_ADMIN_API_KEY BACKEND_EMAIL BACKEND_EMAIL_PASS; do
            if [ -z "${!VAR_NAME}" ]; then
              echo "Missing GitHub secret: $VAR_NAME"
              MISSING=1
            fi
          done

          if [ "$MISSING" -eq 1 ]; then
            echo "Skipping secret sync because one or more backend secrets are missing."
            echo "Configure BACKEND_MONGO_URI, BACKEND_ADMIN_API_KEY, BACKEND_EMAIL, BACKEND_EMAIL_PASS in GitHub secrets."
            exit 0
          fi

          kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace linuxspec-prod --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic backend-secrets-source \
            -n external-secrets \
            --from-literal=MONGO_URI="$BACKEND_MONGO_URI" \
            --from-literal=ADMIN_API_KEY="$BACKEND_ADMIN_API_KEY" \
            --from-literal=EMAIL="$BACKEND_EMAIL" \
            --from-literal=EMAIL_PASS="$BACKEND_EMAIL_PASS" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic backend-secret \
            -n linuxspec-prod \
            --from-literal=MONGO_URI="$BACKEND_MONGO_URI" \
            --from-literal=ADMIN_API_KEY="$BACKEND_ADMIN_API_KEY" \
            --from-literal=EMAIL="$BACKEND_EMAIL" \
            --from-literal=EMAIL_PASS="$BACKEND_EMAIL_PASS" \
            --dry-run=client -o yaml | kubectl apply -f -

          if kubectl get crd externalsecrets.external-secrets.io >/dev/null 2>&1; then
            kubectl apply -k k8s/security/external-secrets
          else
            echo "External Secrets CRD is not installed yet. Apply skipped."
          fi

      - name: Apply Kubernetes manifests
        run: |
          TOKEN="${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || github.token }}"
          USERNAME="${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || env.REGISTRY_OWNER }}"
          kubectl create namespace linuxspec-prod --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-secret \
            -n linuxspec-prod \
            --docker-server="${{ env.REGISTRY }}" \
            --docker-username="$USERNAME" \
            --docker-password="$TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -k k8s

      - name: Enforce Sigstore include label only in linuxspec-prod
        run: |
          kubectl label namespace linuxspec-prod policy.sigstore.dev/include=true --overwrite
          kubectl label namespace default policy.sigstore.dev/include- || true

      - name: Apply Sigstore image policy
        run: |
          kubectl apply -k k8s/security/image-signing
          kubectl get clusterimagepolicy linuxspec-signed-images

      - name: Sigstore admission negative test (must deny unsigned image)
        run: |
          cat <<'EOF' | kubectl apply -f -
          apiVersion: policy.sigstore.dev/v1beta1
          kind: ClusterImagePolicy
          metadata:
            name: ci-negative-busybox-policy
          spec:
            images:
              - glob: "docker.io/library/busybox:*"
            authorities:
              - key:
                  data: |-
                    ${{ secrets.COSIGN_PUBLIC_KEY }}
          EOF

          set +e
          kubectl run ci-sigstore-negative \
            -n linuxspec-prod \
            --image=docker.io/library/busybox:1.36 \
            --restart=Never \
            --dry-run=server -o yaml >/tmp/ci-sigstore-negative.out 2>&1
          STATUS=$?
          set -e

          kubectl delete clusterimagepolicy ci-negative-busybox-policy --ignore-not-found=true

          if [ "$STATUS" -eq 0 ]; then
            echo "Negative Sigstore admission test unexpectedly passed."
            cat /tmp/ci-sigstore-negative.out
            exit 1
          fi

          if ! grep -Eiq "denied|policy.sigstore.dev|signature|cosign" /tmp/ci-sigstore-negative.out; then
            echo "Negative Sigstore admission test failed for an unexpected reason."
            cat /tmp/ci-sigstore-negative.out
            exit 1
          fi

      - name: Sigstore admission positive test (must allow signed image)
        run: |
          kubectl run ci-sigstore-positive \
            -n linuxspec-prod \
            --image=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG \
            --restart=Never \
            --dry-run=server -o yaml >/tmp/ci-sigstore-positive.out
          grep -q "name: ci-sigstore-positive" /tmp/ci-sigstore-positive.out

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/linuxspec-backend -n linuxspec-prod
          kubectl rollout status deployment/linuxspec-frontend -n linuxspec-prod

      - name: Smoke test services
        run: |
          SMOKE_POD="ci-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          kubectl delete pod ci-smoke -n linuxspec-prod --ignore-not-found=true
          kubectl delete pod "$SMOKE_POD" -n linuxspec-prod --ignore-not-found=true
          kubectl run "$SMOKE_POD" -n linuxspec-prod --labels=purpose=smoke-test --image=curlimages/curl:8.10.1 --restart=Never --command -- sh -c \
            "curl -fsS http://linuxspec-backend/health/ready && curl -fsS http://linuxspec-frontend/" 
          kubectl wait -n linuxspec-prod --for=condition=Ready "pod/$SMOKE_POD" --timeout=60s || true
          kubectl logs -n linuxspec-prod "$SMOKE_POD"
          kubectl delete pod -n linuxspec-prod "$SMOKE_POD" --ignore-not-found=true

      - name: DAST baseline scan (OWASP ZAP) - frontend
        run: |
          mkdir -p security-reports
          docker run --rm -v "$PWD:/zap/wrk/:rw" ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t https://linuxspec.com \
            -m 5 \
            -c /zap/wrk/.zap/rules.tsv \
            -I \
            -r security-reports/zap-frontend.html \
            -J security-reports/zap-frontend.json

      - name: DAST baseline scan (OWASP ZAP) - backend
        run: |
          mkdir -p security-reports
          docker run --rm -v "$PWD:/zap/wrk/:rw" ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t https://api.linuxspec.com \
            -m 5 \
            -c /zap/wrk/.zap/rules.tsv \
            -I \
            -r security-reports/zap-backend.html \
            -J security-reports/zap-backend.json

      - name: Upload DAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-${{ github.run_id }}-${{ github.run_attempt }}
          path: security-reports/*
          if-no-files-found: warn

      - name: Rollback on failure
        if: failure()
        run: |
          set +e
          kubectl rollout undo deployment/linuxspec-backend -n linuxspec-prod
          BACKEND_STATUS=$?
          kubectl rollout undo deployment/linuxspec-frontend -n linuxspec-prod
          FRONTEND_STATUS=$?
          set -e

          if [ "$BACKEND_STATUS" -ne 0 ] || [ "$FRONTEND_STATUS" -ne 0 ]; then
            echo "Rollback was attempted but partially blocked (possibly by Sigstore policy or missing previous ReplicaSet)."
            echo "backend_rollback_status=$BACKEND_STATUS frontend_rollback_status=$FRONTEND_STATUS"
          fi
