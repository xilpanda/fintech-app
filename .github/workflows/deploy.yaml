name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - k8s/kustomization.yaml

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: xilpanda
  BACKEND_IMAGE_NAME: linuxspec-backend
  FRONTEND_IMAGE_NAME: linuxspec-frontend

jobs:
  deploy:
    if: >-
      ${{ github.event.head_commit.message != 'build: automatic update of fintech-app' }}
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          TAG=${GITHUB_SHA::7}
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: GHCR login
        run: |
          TOKEN="${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || github.token }}"
          USERNAME="${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || env.REGISTRY_OWNER }}"
          echo "$TOKEN" | docker login ${{ env.REGISTRY }} -u "$USERNAME" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG ./linuxspec-backend

      - name: Push backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG || (sleep 5 && docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG)

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.linuxspec.com \
            --build-arg NEXT_PUBLIC_CALENDLY_URL=https://calendly.com/linuxspec/intro-call \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG \
            ./linuxspec-frontend

      - name: Push frontend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG || (sleep 5 && docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG)

      - name: Update deployment image
        run: |
          sed -i "/name: ${{ env.REGISTRY }}\\/${{ env.REGISTRY_OWNER }}\\/${{ env.BACKEND_IMAGE_NAME }}/{n;s/newTag:.*/newTag: $TAG/;}" k8s/kustomization.yaml
          sed -i "/name: ${{ env.REGISTRY }}\\/${{ env.REGISTRY_OWNER }}\\/${{ env.FRONTEND_IMAGE_NAME }}/{n;s/newTag:.*/newTag: $TAG/;}" k8s/kustomization.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k k8s

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/linuxspec-backend
          kubectl rollout status deployment/linuxspec-frontend

      - name: Smoke test services
        run: |
          SMOKE_POD="ci-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          kubectl delete pod ci-smoke --ignore-not-found=true
          kubectl delete pod "$SMOKE_POD" --ignore-not-found=true
          kubectl run "$SMOKE_POD" --image=curlimages/curl:8.10.1 --restart=Never --command -- sh -c \
            "curl -fsS http://linuxspec-backend/health/ready && curl -fsS http://linuxspec-frontend/" 
          kubectl wait --for=condition=Ready "pod/$SMOKE_POD" --timeout=60s || true
          kubectl logs "$SMOKE_POD"
          kubectl delete pod "$SMOKE_POD" --ignore-not-found=true

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/linuxspec-backend
          kubectl rollout undo deployment/linuxspec-frontend || true
