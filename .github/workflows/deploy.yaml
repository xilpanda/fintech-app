name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE_NAME: linuxspec-backend
  FRONTEND_IMAGE_NAME: linuxspec-frontend

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          TAG=${GITHUB_SHA::7}
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Docker login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG ./linuxspec-backend

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.linuxspec.com \
            --build-arg NEXT_PUBLIC_CALENDLY_URL=https://calendly.com/linuxspec/intro-call \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG \
            ./linuxspec-frontend

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG

      - name: Update deployment image
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG|g" k8s/backend-deployment.yaml
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG|g" k8s/frontend-deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k k8s

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/linuxspec-backend
          kubectl rollout status deployment/linuxspec-frontend

      - name: Smoke test services
        run: |
          kubectl run ci-smoke --image=curlimages/curl:8.10.1 --restart=Never --command -- sh -c \
            "curl -fsS http://linuxspec-backend/health/ready && curl -fsS http://linuxspec-frontend/" 
          kubectl wait --for=condition=Ready pod/ci-smoke --timeout=60s || true
          kubectl logs ci-smoke
          kubectl delete pod ci-smoke --ignore-not-found=true

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/linuxspec-backend
          kubectl rollout undo deployment/linuxspec-frontend || true
