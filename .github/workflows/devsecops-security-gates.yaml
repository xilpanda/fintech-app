name: DevSecOps Security Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  security-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Secret scan (Gitleaks)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.24.3 detect \
            --source /repo --redact --verbose --exit-code 1

      - name: Install Trivy
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          trivy --version

      - name: Filesystem vulnerability scan (Trivy)
        run: |
          trivy fs --ignore-unfixed --ignorefile .trivyignore \
            --severity HIGH,CRITICAL --exit-code 1 .
