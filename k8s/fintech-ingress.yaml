apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fintech-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: linuxspec.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: linuxspec-frontend
                port:
                  number: 80
    - host: www.linuxspec.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: linuxspec-frontend
                port:
                  number: 80
    - host: frontend.linuxspec.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: linuxspec-frontend
                port:
                  number: 80
