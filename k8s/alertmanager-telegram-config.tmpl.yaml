apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: telegram-notifications
  namespace: default
  labels:
    release: monitoring
spec:
  route:
    receiver: telegram-default
    groupBy:
      - alertname
      - service
      - severity
    groupWait: 30s
    groupInterval: 1m
    repeatInterval: 4h
    routes:
      - receiver: telegram-critical
        matchers:
          - name: severity
            value: critical
            matchType: "="
        groupInterval: 30s
        repeatInterval: 30m
      - receiver: telegram-warning
        matchers:
          - name: severity
            value: warning
            matchType: "="
        muteTimeIntervals:
          - quiet-hours
        repeatInterval: 2h
  muteTimeIntervals:
    - name: quiet-hours
      timeIntervals:
        - times:
            - startTime: "00:00"
              endTime: "08:00"
        - times:
            - startTime: "22:00"
              endTime: "23:59"
  receivers:
    - name: telegram-default
      telegramConfigs:
        - botToken:
            name: telegram-bot-token
            key: token
          chatID: __TELEGRAM_CHAT_ID__
          parseMode: Markdown
          sendResolved: true
          message: |
            *{{ .Status | toUpper }}* - {{ .CommonLabels.alertname }}
            Service: {{ .CommonLabels.service }}
            Severity: {{ .CommonLabels.severity }}
            {{- if .CommonAnnotations.summary }}
            Summary: {{ .CommonAnnotations.summary }}
            {{- end }}
            {{- if .CommonAnnotations.description }}
            Description: {{ .CommonAnnotations.description }}
            {{- end }}
    - name: telegram-critical
      telegramConfigs:
        - botToken:
            name: telegram-bot-token
            key: token
          chatID: __TELEGRAM_CHAT_ID__
          parseMode: Markdown
          sendResolved: true
          message: |
            *CRITICAL* - {{ .CommonLabels.alertname }}
            Service: {{ .CommonLabels.service }}
            {{- if .CommonAnnotations.summary }}
            Summary: {{ .CommonAnnotations.summary }}
            {{- end }}
            {{- if .CommonAnnotations.description }}
            Description: {{ .CommonAnnotations.description }}
            {{- end }}
    - name: telegram-warning
      telegramConfigs:
        - botToken:
            name: telegram-bot-token
            key: token
          chatID: __TELEGRAM_CHAT_ID__
          parseMode: Markdown
          sendResolved: true
          message: |
            *{{ .Status | toUpper }}* - {{ .CommonLabels.alertname }}
            Service: {{ .CommonLabels.service }}
            Severity: {{ .CommonLabels.severity }}
            {{- if .CommonAnnotations.summary }}
            Summary: {{ .CommonAnnotations.summary }}
            {{- end }}
            {{- if .CommonAnnotations.description }}
            Description: {{ .CommonAnnotations.description }}
            {{- end }}
