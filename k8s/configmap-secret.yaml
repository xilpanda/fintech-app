apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  PORT: "5000"
  FRONTEND_ORIGIN: https://linuxspec.com
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
stringData:
  MONGO_URI: mongodb://mongodb:27017/linuxspec
  ADMIN_API_KEY: change_this_admin_key
  EMAIL: your@email.com
  EMAIL_PASS: app_password
