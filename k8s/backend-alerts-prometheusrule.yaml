apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backend-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: linuxspec-backend-alerts
      rules:
        - alert: LinuxspecBackendDown
          expr: |
            sum(up{job="linuxspec-backend", namespace="default"}) < 1
          for: 1m
          labels:
            severity: critical
            service: linuxspec-backend
          annotations:
            summary: "Linuxspec backend is down"
            description: "Prometheus cannot scrape linuxspec-backend for at least 2 minutes."

        - alert: LinuxspecBackendHighLatencyP95
          expr: |
            histogram_quantile(
              0.95,
              sum by (le) (
                rate(http_request_duration_seconds_bucket{job="linuxspec-backend", namespace="default"}[5m])
              )
            ) > 0.5
          for: 10m
          labels:
            severity: warning
            service: linuxspec-backend
          annotations:
            summary: "Linuxspec backend latency p95 is high"
            description: "P95 latency for linuxspec-backend stayed above 500ms for 10 minutes."

        - alert: LinuxspecBackendHighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{job="linuxspec-backend", namespace="default", status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(http_requests_total{job="linuxspec-backend", namespace="default"}[5m])), 0.001)
            ) > 0.05
          for: 10m
          labels:
            severity: warning
            service: linuxspec-backend
          annotations:
            summary: "Linuxspec backend error rate is high"
            description: "5xx rate exceeded 5% for linuxspec-backend for at least 10 minutes."

        - alert: LinuxspecBackendHighCpuUsage
          expr: |
            sum(
              rate(container_cpu_usage_seconds_total{
                namespace="default",
                pod=~"linuxspec-backend-.*",
                container="linuxspec-backend"
              }[5m])
            ) > 0.8
          for: 10m
          labels:
            severity: warning
            service: linuxspec-backend
          annotations:
            summary: "Linuxspec backend CPU usage is high"
            description: "Backend CPU usage has been above 0.8 cores for at least 10 minutes."

        - alert: LinuxspecBackendHighMemoryUsage
          expr: |
            sum(
              container_memory_working_set_bytes{
                namespace="default",
                pod=~"linuxspec-backend-.*",
                container="linuxspec-backend"
              }
            ) > 838860800
          for: 10m
          labels:
            severity: warning
            service: linuxspec-backend
          annotations:
            summary: "Linuxspec backend memory usage is high"
            description: "Backend memory working set has been above 800Mi for at least 10 minutes."

        - alert: LinuxspecBackendRestartSpike
          expr: |
            increase(kube_pod_container_status_restarts_total{
              namespace="default",
              pod=~"linuxspec-backend-.*",
              container="linuxspec-backend"
            }[10m]) > 1
          for: 5m
          labels:
            severity: warning
            service: linuxspec-backend
          annotations:
            summary: "Linuxspec backend is restarting"
            description: "Backend container restarted more than once within 10 minutes."
