apiVersion: apps/v1
kind: Deployment
metadata:
  name: linuxspec-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linuxspec-frontend
  template:
    metadata:
      labels:
        app: linuxspec-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: linuxspec-frontend
          image: ghcr.io/xilpanda/linuxspec-frontend:20eb9d4
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
