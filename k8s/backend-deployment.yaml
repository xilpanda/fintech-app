apiVersion: apps/v1
kind: Deployment
metadata:
  name: linuxspec-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linuxspec-backend
  template:
    metadata:
      labels:
        app: linuxspec-backend
    spec:
      containers:
        - name: linuxspec-backend
          image: xil01/linuxspec-backend:43b394f
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
