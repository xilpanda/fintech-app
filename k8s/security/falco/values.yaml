falco:
  jsonOutput: true
  jsonIncludeOutputProperty: true
  httpOutput:
    enabled: false

driver:
  kind: modern_ebpf

tty: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

falcoctl:
  artifact:
    install:
      enabled: true
    follow:
      enabled: true

falcosidekick:
  enabled: true
  webui:
    enabled: false
  config:
    alertmanager:
      hostport: "http://monitoring-kube-prometheus-alertmanager.monitoring.svc:9093"
      minimumpriority: warning

customRules:
  devsecops-local-rules.yaml: |-
    - rule: Write Below Root
      desc: Detect file write below root directories in containers
      condition: container and evt.type in (open,openat,creat) and fd.name startswith /etc and evt.arg.flags contains O_WRONLY
      output: "Write below /etc detected (user=%user.name command=%proc.cmdline file=%fd.name container=%container.id image=%container.image.repository)"
      priority: WARNING
  d3-threat-hunting-rules.yaml: |-
    - rule: Linuxspec Reverse Shell Pattern
      desc: Detect common reverse shell command patterns in containers
      condition: container and spawned_process and proc.cmdline regex "(bash -i|sh -i|nc .* -e|ncat .* --exec|python .*socket.*connect)"
      output: "Reverse shell pattern detected (user=%user.name command=%proc.cmdline pod=%k8s.pod.name ns=%k8s.ns.name image=%container.image.repository)"
      priority: CRITICAL
      tags: [linuxspec, d3, reverse-shell]

    - rule: Linuxspec Suspicious Sensitive File Read
      desc: Detect reads of sensitive host-like files from containers
      condition: container and open_read and fd.name in (/etc/shadow, /etc/passwd, /root/.ssh/id_rsa, /root/.bash_history)
      output: "Sensitive file read detected (user=%user.name command=%proc.cmdline file=%fd.name pod=%k8s.pod.name ns=%k8s.ns.name)"
      priority: WARNING
      tags: [linuxspec, d3, file-access]

    - rule: Linuxspec Crypto Miner Binary Execution
      desc: Detect known crypto miner process names in containers
      condition: container and spawned_process and proc.name in (xmrig, minerd, kinsing, kdevtmpfsi)
      output: "Crypto miner process detected (proc=%proc.name command=%proc.cmdline pod=%k8s.pod.name ns=%k8s.ns.name image=%container.image.repository)"
      priority: CRITICAL
      tags: [linuxspec, d3, miner]
